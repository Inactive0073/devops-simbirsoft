services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ | grep -q 'Hello DevOps world!'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
