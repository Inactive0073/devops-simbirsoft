<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nginx for Simbirsoft</title>
</head>

<body>
    <span>Hello DevOps World</span>
    <div id='clock'>Время</div> <br>
</body>
<script>
    window.onload = function () {
        window.setInterval(
            function () {
                var d = new Date();
                document.getElementById("clock").innerHTML = d.toLocaleTimeString();
            }
            , 1000);
    }
</script>

</html>
